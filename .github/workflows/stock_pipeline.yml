name: 台股大數據自動化流水線

on:
  schedule:
    # 📝 16:00 台北時間 = 08:00 UTC 標準時間 (週一至週五)
    - cron: '0 8 * * 1-5'
    # 📝 17:00 台北時間 = 09:00 UTC 標準時間 (週一至週五)
    - cron: '0 9 * * 1-5'

jobs:
  # ==========================================
  # 任務一：16:00 抓取原始數據存入資料庫 1
  # ==========================================
  collect-raw-data:
    if: github.event.schedule == '0 8 * * 1-5'
    runs-on: ubuntu-latest
    steps:
    - name: 複製專案代碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安裝必要套件
      run: pip install google-cloud-bigquery pandas yfinance db-types

    - name: 執行資料庫 1 數據抓取
      env:
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      run: |
        # 建立臨時金鑰檔案供 SDK 讀取
        echo "$GCP_SA_KEY" > credentials.json
        
        # 📝 執行你的 Python 抓取程式（程式碼見後文）
        python fetch_to_db1.py

  # ==========================================
  # 任務二：17:00 抓取資料庫 1 計算存入資料庫 2 並發送 Discord
  # ==========================================
  analyze-and-notify:
    if: github.event.schedule == '0 9 * * 1-5'
    runs-on: ubuntu-latest
    steps:
    - name: 複製專案代碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安裝必要套件
      run: pip install google-cloud-bigquery pandas requests

    - name: 執行資料庫 2 分析與發送 Discord
      env:
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        DISCORD_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        echo "$GCP_SA_KEY" > credentials.json
        
        # 📝 執行你的 Python 分析程式（程式碼見後文）
        python process_to_db2.py
