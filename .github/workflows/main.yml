name: Taiwan Stock AI v36.5 Standard Execution

on:
  schedule:
    - cron: '*/5 1-5 * * 1-5' # 台灣時間 09:00 - 13:45 每 5 分鐘執行
  workflow_dispatch: # 支援手動觸發測試

jobs:
  trade_job:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      MY_STRATEGY_KEY: ${{ secrets.MY_STRATEGY_KEY }}
      TZ: Asia/Taipei 

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install pandas requests reportlab numpy tqdm yfinance pycryptodome FinMind
      - name: Run AI System
        run: python -u Program_B_Core.py
